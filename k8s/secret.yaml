# This secret is managed by the CI/CD pipeline (cd.yml)
# The ATLAS_URI value is injected from GitHub Secrets at deploy time
# DO NOT commit real credentials here
apiVersion: v1
kind: Secret
metadata:
  name: mern-secret
  namespace: mern-app
type: Opaque
stringData:
  ATLAS_URI: "PLACEHOLDER_REPLACED_BY_CICD"
