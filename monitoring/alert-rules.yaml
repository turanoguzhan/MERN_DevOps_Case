apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mern-app-alerts
  namespace: monitoring
  labels:
    release: monitoring 
spec:
  groups:
    - name: mern-app.pods
      interval: 30s
      rules:
        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="mern-app"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 3 times in the last 15 minutes."

        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="mern-app", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been in a non-ready state for more than 5 minutes."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="mern-app"} != kube_deployment_status_available_replicas{namespace="mern-app"}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} replica mismatch"
            description: "Deployment {{ $labels.deployment }} has fewer available replicas than desired."

    - name: mern-app.backend
      interval: 30s
      rules:
        - alert: HighHTTPErrorRate
          expr: |
            rate(http_requests_total{job="mern-backend", status=~"5.."}[5m])
            /
            rate(http_requests_total{job="mern-backend"}[5m]) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High HTTP error rate on MERN backend"
            description: "More than 5% of requests to the backend are returning 5xx errors for 2 minutes."

        - alert: HighResponseLatency
          expr: |
            histogram_quantile(0.95,
              rate(http_request_duration_seconds_bucket{job="mern-backend"}[5m])
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High response latency on MERN backend"
            description: "The 95th percentile response time is above 2 seconds for 5 minutes."

        - alert: BackendDown
          expr: |
            up{job="mern-backend"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "MERN backend is down"
            description: "The MERN backend service is not reachable by Prometheus."

    - name: mern-app.nodes
      interval: 60s
      rules:
        - alert: NodeHighCPUUsage
          expr: |
            100 - (avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on node {{ $labels.node }}"
            description: "Node {{ $labels.node }} has CPU usage above 80% for 10 minutes."

        - alert: NodeHighMemoryUsage
          expr: |
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on node {{ $labels.node }}"
            description: "Node {{ $labels.node }} has memory usage above 85% for 10 minutes."
