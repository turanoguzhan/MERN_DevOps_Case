version: "3.9"

services:
  server:
    build:
      context: ./server
    container_name: mern-server
    ports:
      - "5050:5050"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050/healthcheck/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      args:
        REACT_APP_API_URL: /api
    container_name: mern-client
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
