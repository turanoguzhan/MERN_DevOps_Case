name: CD — Deploy to AWS EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: mern-cluster

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: mern-project/client
          push: true
          build-args: |
            REACT_APP_API_URL=/api
          tags: |
            ${{ secrets.ECR_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.ECR_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: mern-project/server
          push: true
          tags: |
            ${{ secrets.ECR_BACKEND }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.ECR_BACKEND }}:latest

      - name: Build and push ETL image
        uses: docker/build-push-action@v5
        with:
          context: python-project
          push: true
          tags: |
            ${{ secrets.ECR_ETL }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.ECR_ETL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS cluster
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create/update MongoDB Atlas secret
        run: |
          kubectl create secret generic mern-secret \
            --namespace mern-app \
            --from-literal=ATLAS_URI="${{ secrets.ATLAS_URI }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend
        env:
          ECR_BACKEND: ${{ secrets.ECR_BACKEND }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          envsubst < k8s/backend/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/backend/service.yaml

      - name: Deploy frontend
        env:
          ECR_FRONTEND: ${{ secrets.ECR_FRONTEND }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          envsubst < k8s/frontend/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/frontend/service.yaml

      - name: Apply ingress
        run: kubectl apply -f k8s/ingress.yaml

      - name: Deploy ETL CronJob
        env:
          ECR_ETL: ${{ secrets.ECR_ETL }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          envsubst < k8s/etl-cronjob.yaml | kubectl apply -f -

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend \
            --namespace mern-app \
            --timeout=300s

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend \
            --namespace mern-app \
            --timeout=300s

      - name: Get application URL
        run: |
          echo "Application URL:"
          kubectl get ingress mern-ingress -n mern-app \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || \
            echo "ALB provisioning... check AWS console for URL"
